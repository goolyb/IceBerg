<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iceberg</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="site-header">
        <h1>Айсберг по чату доты</h1>
        <nav>
            <a href="https://forms.gle/TjrYvDXJNy6B21MD6" class="docs-link" target="_blank" rel="noopener">
                <i class="fa-solid fa-file-lines"></i>
                <span>Ваши идеи</span>
            </a>
            <a href="https://t.me/chat_dota2" class="tg-link" target="_blank" rel="noopener">
                <i class="fa-brands fa-telegram-plane"></i>
                <span>Ссылка на чат</span>
            </a>
        </nav>
    </header>

    <main>
        <div class="iceberg">
            <div class="tier" style="--i: 1">
                <div class="tier-content">Уровень 1</div>
            </div>
            <div class="tier" style="--i: 2">
                <div class="tier-content">Уровень 2</div>
            </div>
            <div class="tier" style="--i: 3">
                <div class="tier-content">Уровень 3</div>
            </div>
            <div class="tier" style="--i: 4">
                <div class="tier-content">Уровень 4</div>
            </div>
            <div class="tier" style="--i: 5">
                <div class="tier-content">Уровень 5</div>
            </div>
            <div class="tier" style="--i: 6">
                <div class="tier-content">Уровень 6</div>
            </div>
            <div class="tier" style="--i: 7">
                <div class="tier-content">Уровень 7</div>
            </div>
            <div class="tier" style="--i: 8">
                <div class="tier-content">Уровень 8</div>
            </div>
        </div>
    </main>

    <footer >
        <a class="made-by">made by foofa <3</a>
    </footer>

    <script src="js/script.js"></script>
</body>

</html>
